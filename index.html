// ─── Helpers ─────────────────────────────────────────────────────────────────
const {useState,useRef,useEffect,useCallback,createElement:h} = React;

function renderMath(text) {
  return text
    .replace(/\$\$([^$]+)\$\$/g, (_,t)=>katex.renderToString(t,{throwOnError:false,displayMode:true}))
    .replace(/\$([^$]+)\$/g,     (_,t)=>katex.renderToString(t,{throwOnError:false,displayMode:false}));
}

// Render a string with math and optional bold (**text**) to an HTML string
function toHtml(text) {
  return renderMath(text.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>'));
}

// Component that renders math text inline
function MathSpan({text, style}) {
  return h('span',{dangerouslySetInnerHTML:{__html:renderMath(text)},style});
}

// Component for multi-paragraph math text (splits on \n\n)
function MathBlock({text, style}) {
  const parts = text.split('\n\n').map((p,i)=>
    h('p',{key:i,style:{marginBottom:6,lineHeight:1.8},
      dangerouslySetInnerHTML:{__html:renderMath(p.replace(/\n/g,'<br/>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>'))}})
  );
  return h('div',{style},parts);
}

   text:`解二元一次聯立方程式 $$\\begin{cases} x + 2y = 5 \\\\ 2x - 2y = 1 \\end{cases}$$ 得 $x$ 值為何？`,
   options:['(A) −4','(B) −2','(C) 2','(D) 4'],
   answer:'C',
   explanation:`**解題步驟：**

兩式相加消去 $y$：

$$(x+2y)+(2x-2y)=5+1$$

$$3x=6 \\Rightarrow x=2$$

代回驗算：$2+2y=5 \\Rightarrow y=\\dfrac{3}{2}$

∴ 答案為 **(C) 2**`},

  {id:8,number:8,img:'q8',
   text:`有一培養皿上均勻分布細菌，圖（二）是培養皿與其俯視圖，生物學家在培養皿上選定四個圓形區域，區域面積越大所含細菌數越多。若圖中甲、乙、丙三個區域細菌的數量分別為 $4.4 \\times 10^5$ 個、$7.3 \\times 10^6$ 個、$5.4 \\times 10^7$ 個，則下列何者可能是丁區域細菌的數量？`,
   options:['(A) $1.7 \\times 10^5$ 個','(B) $1.7 \\times 10^6$ 個','(C) $1.7 \\times 10^7$ 個','(D) $1.7 \\times 10^8$ 個'],
   answer:'C',
   explanation:`**解題步驟：**

由圖（二）俯視圖觀察各圓形區域面積大小：

$$\\text{丙} > \\text{丁} > \\text{乙} > \\text{甲}$$

（丙圓最大，丁次之，乙較小，甲最小）

因此細菌數量關係：

$$5.4\\times10^7 = \\text{丙} > \\text{丁} > \\text{乙} = 7.3\\times10^6 > \\text{甲} = 4.4\\times10^5$$

即丁介於乙（$7.3\\times10^6$）和丙（$5.4\\times10^7$）之間。

逐項驗證：
- **(A)** $1.7\\times10^5 < 4.4\\times10^5$（比甲還少，❌ 不符）
- **(B)** $1.7\\times10^6$：介於甲和乙之間，比乙還小，也比丁小（❌ 不符）
- **(C)** $1.7\\times10^7$：$7.3\\times10^6 < 1.7\\times10^7 < 5.4\\times10^7$，丁介於乙和丙之間 ✓
- **(D)** $1.7\\times10^8 > 5.4\\times10^7$（比丙還多，❌ 不符）

∴ 答案為 **(C) $1.7 \\times 10^7$**`},

根據圖中的對話計算，妹妹要買的書原價為多少元？`,
   options:['(A) 360','(B) 380','(C) 460','(D) 480'],
   answer:'D',
   explanation:`**解題步驟：**

由對話可知哥哥書原價 $= 720$ 元，哥哥應分攤 $600$ 元。

設妹妹書原價為 $x$ 元，依比例分攤折扣後：

$$\\frac{720}{720+x}\\times[(720+x)-200]=600$$

$$720-\\frac{144000}{720+x}=600$$

$$\\frac{144000}{720+x}=120$$

$$720+x=1200 \\Rightarrow x=480$$

∴ 答案為 **(D) 480**`},

  {id:11,number:11,img:'q11',
   text:`$A(a)$、$B(b)$、$P(a+b)$ 三點在數線上的位置如圖（四）所示。若要在數線上標示點 $Q(b-a)$，則關於 $Q$ 點的位置，下列敘述何者正確？`,
   options:['(A) 在 $B$ 的右邊','(B) 介於 $A$、$B$ 之間','(C) 介於 $P$、$A$ 之間','(D) 在 $P$ 的左邊'],
   answer:'A',
   explanation:`**解題步驟：**

由圖知 $P(a+b) < A(a) < B(b)$

從 $P < A$：$a+b < a \\Rightarrow b < 0$

從 $A < B$：$a < b$，且兩者皆負，即 $a < b < 0$

所以 $|a| > |b|$，即 $-a > -b > 0$

$$b-a = b+(-a)$$

因為 $-a > |b|$，所以 $b-a > 0$

而 $B(b) < 0$，故 $Q(b-a) > 0 > b$

$\\Rightarrow Q$ 在 $B$ 的右邊

∴ 答案為 **(A) 在 B 的右邊**`},

  {id:13,number:13,
   text:`若坐標平面上有一直線 $L$ 與 $x$ 軸平行，且 $L$ 通過點 $(-3, -1)$，則 $L$ 的方程式為何？`,

  {id:17,number:17,
   text:`某國政府公布 2023 年的全國用電量為 2700 億度，並預估 2024 ～ 2030 年的全國用電量逐年增加，且每年增加的用電量為其前一年的 2.5%。根據預估，該國 2030 年的全國用電量為多少億度？`,
   options:['(A) $2700 \\times (1.025)^7$','(B) $2700 \\times (1.025)^8$','(C) $2700 + 7 \\times 2700 \\times 0.025$','(D) $2700 + 8 \\times 2700 \\times 0.025$'],
   answer:'A',
   explanation:`**解題步驟：**

每年為前一年的 $1+2.5\\%=1.025$ 倍（**等比成長**）。

從 2023 年到 2030 年共 $2030-2023=\\mathbf{7}$ 年：

- 2024 年：$2700\\times1.025^1$
- 2025 年：$2700\\times1.025^2$
- $\\vdots$
- 2030 年：$2700\\times1.025^7$

(C)(D) 是**等差**（每年固定加同樣量）的寫法，與題意不符。

∴ 答案為 **(A) $2700\\times(1.025)^7$**`},

$M = 44\\times p$（$p$ 為 $M$ 最小質因數）

因 44 含因數 2，故 $p \\leq 2$，即 $p=2$

$$M=88=2^3\\times11$$

$8=2^3$ 整除 $88$（$88\\div8=11$） ✓　**甲正確**

---

**分析乙（N）：**

$N$ 除自身外最大因數 $=39=3\\times13$

$N = 39\\times q$（$q$ 為最小質因數，$q\\leq3$）

- 若 $q=2$：$N=78=2\\times3\\times13$，$78\\div9=8.67$，**9 不整除** ❌
- 若 $q=3$：$N=117=3^2\\times13$，$117\\div9=13$，9 整除 ✓

因 $N$ 可能等於 78，所以 9 **不一定**是 $N$ 的因數。**乙錯誤**

---

∴ 答案為 **(C) 甲正確，乙錯誤**`},
];

// ─── Canvas hook ─────────────────────────────────────────────────────────────
function useDrawCanvas(strokes, onStrokes, tool, color, W, H) {
  const ref = useRef(null);
  const drawing = useRef(false);
  const cur = useRef([]);

  const redraw = useCallback((ctx, ss) => {
    ctx.clearRect(0,0,W,H);
    ss.forEach(s => {
      if (s.pts.length < 2) return;
      ctx.beginPath();
      ctx.strokeStyle = s.color; ctx.lineWidth = s.w;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.moveTo(s.pts[0].x, s.pts[0].y);
      s.pts.slice(1).forEach(p => ctx.lineTo(p.x,p.y));
      ctx.stroke();
    });
  },[W,H]);

  useEffect(() => {
    const c = ref.current; if(!c) return;
    redraw(c.getContext('2d'), strokes);
  },[strokes,redraw]);

  function getPos(e) {
    const r = ref.current.getBoundingClientRect();
    const sx=W/r.width, sy=H/r.height;
    const src = e.touches ? e.touches[0] : e;
    return {x:(src.clientX-r.left)*sx, y:(src.clientY-r.top)*sy};
  }

  function styleFor() {
    if (tool==='eraser') return {color:'#fff',w:20};
    if (tool==='hi')     return {color:color.replace(/rgb\((\d+),(\d+),(\d+)\)/,'rgba($1,$2,$3,0.35)') || hexToRgba(color,0.35), w:18};
    return {color,w:3};
  }

  function hexToRgba(hex,a) {
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  function down(e) {
    e.preventDefault();
    drawing.current = true;
    cur.current = [getPos(e)];
    if (e.pointerId!=null) e.target.setPointerCapture(e.pointerId);
  }
  function move(e) {
    if (!drawing.current) return;
    e.preventDefault();
    const pos = getPos(e);
    cur.current.push(pos);
    const c = ref.current; if(!c) return;
    const ctx = c.getContext('2d');
    const s = styleFor();
    if (tool==='eraser') {
      redraw(ctx,strokes);
      ctx.save(); ctx.globalCompositeOperation='destination-out';
      ctx.beginPath(); ctx.arc(pos.x,pos.y,15,0,Math.PI*2); ctx.fill();
      ctx.restore();
    } else {
      const pts = cur.current;
      if (pts.length>=2) {
        ctx.beginPath(); ctx.strokeStyle=s.color; ctx.lineWidth=s.w;
        ctx.lineCap='round'; ctx.lineJoin='round';
        ctx.moveTo(pts[pts.length-2].x,pts[pts.length-2].y);
        ctx.lineTo(pts[pts.length-1].x,pts[pts.length-1].y);
        ctx.stroke();
      }
    }
  }
  function up() {
    if (!drawing.current) return;
    drawing.current = false;
    const s = styleFor();
    if (tool!=='eraser' && cur.current.length>=2) {
      onStrokes([...strokes,{pts:[...cur.current],color:s.color,w:s.w}]);
    } else if (tool==='eraser') {
      const c=ref.current; if(!c) return;
      redraw(c.getContext('2d'),strokes);
    }
    cur.current=[];
  }
  return {ref,down,move,up};
}

// ─── AnnCanvas ────────────────────────────────────────────────────────────────
function AnnCanvas({W,H,strokes,onStrokes,tool,color}) {
  const {ref,down,move,up} = useDrawCanvas(strokes,onStrokes,tool,color,W,H);
  return h('canvas',{ref,width:W,height:H,
    style:{position:'absolute',top:0,left:0,width:'100%',height:'100%',
           cursor:tool==='eraser'?'cell':'crosshair',touchAction:'none'},
    onPointerDown:down,onPointerMove:move,onPointerUp:up,onPointerLeave:up});
}

// ─── Image + annotation overlay ──────────────────────────────────────────────
function ImgAnnotate({imgKey,strokes,onStrokes,tool,color}) {
  const wrapRef = useRef(null);
  const imgRef  = useRef(null);
  const [wW, setWW] = useState(1);
  const [nat, setNat] = useState({w:1,h:1});

  useEffect(()=>{
    const obs = new ResizeObserver(es=>{
      for(const e of es) setWW(Math.floor(e.contentRect.width));
    });
    if(wrapRef.current) obs.observe(wrapRef.current);
    return ()=>obs.disconnect();
  },[]);

  const canH = nat.w>0 ? Math.round(wW*nat.h/nat.w) : wW;

  return h('div',{ref:wrapRef,style:{position:'relative',width:'100%',flexShrink:0,borderRadius:10,border:'1px solid #e2e8f0'}},
    h('img',{ref:imgRef,src:window.IMGS[imgKey],alt:'',
      style:{width:'100%',height:'auto',display:'block',userSelect:'none',WebkitUserDrag:'none',pointerEvents:'none'},
      onLoad:()=>{if(imgRef.current) setNat({w:imgRef.current.naturalWidth,h:imgRef.current.naturalHeight})}}),
    wW>1 && h(AnnCanvas,{W:wW,H:canH,strokes,onStrokes,tool,color})
  );
}

// ─── Scratch pad ─────────────────────────────────────────────────────────────
function ScratchPad({strokes,onStrokes,tool,color}) {
  const ref = useRef(null);
  const [sz,setSz] = useState({w:400,h:600});
  useEffect(()=>{
    const obs=new ResizeObserver(es=>{
      for(const e of es) setSz({w:Math.floor(e.contentRect.width),h:Math.floor(e.contentRect.height)});
    });
    if(ref.current) obs.observe(ref.current);
    return ()=>obs.disconnect();
  },[]);
  return h('div',{ref,style:{flex:1,position:'relative',borderRadius:12,overflow:'hidden',
    border:'1px solid #e2e8f0',backgroundColor:'#fefce8',
    backgroundImage:'repeating-linear-gradient(0deg,transparent,transparent 27px,#d1d5db 27px,#d1d5db 28px)',
    backgroundSize:'100% 28px'}},
    h('span',{style:{position:'absolute',top:6,left:10,fontSize:11,color:'#94a3b8',fontWeight:600,
      pointerEvents:'none',userSelect:'none'}},'計算紙'),
    sz.w>1 && h(AnnCanvas,{W:sz.w,H:sz.h,strokes,onStrokes,tool,color})
  );
}

// ─── Toolbar ─────────────────────────────────────────────────────────────────
const COLORS = ['#1d4ed8','#dc2626','#16a34a','#9333ea','#ea580c','#000000'];

function Toolbar({tool,setTool,color,setColor,onUndo,onClear}) {
  const tbtn = (label,t,bg) => h('button',{
    key:t,onClick:()=>setTool(t),
    style:{padding:'6px 12px',borderRadius:6,fontSize:12,fontWeight:600,
           border:tool===t?`2px solid ${bg}`:'2px solid #e2e8f0',
           background:tool===t?bg:'#f8fafc',
           color:tool===t?'#fff':'#475569',transition:'all .15s'}
  },label);

  return h('div',{style:{display:'flex',alignItems:'center',gap:6,padding:'8px 16px',
    background:'#fff',borderBottom:'1px solid #f1f5f9',flexShrink:0,flexWrap:'wrap'}},
    tbtn('✏️ 筆','pen','#2563eb'),
    tbtn('🖊 螢光筆','hi','#f59e0b'),
    tbtn('🧹 橡皮擦','eraser','#475569'),
    h('div',{style:{display:'flex',gap:4,marginLeft:4}},
      COLORS.map(c=>h('button',{key:c,onClick:()=>setColor(c),style:{
        width:22,height:22,borderRadius:'50%',background:c,
        border:color===c?'2.5px solid #1e293b':'2px solid transparent',
        transform:color===c?'scale(1.2)':'scale(1)',transition:'transform .1s'
      }}))
    ),
    h('button',{onClick:onUndo,style:{padding:'6px 12px',borderRadius:6,fontSize:12,fontWeight:600,
      border:'2px solid #e2e8f0',background:'#f8fafc',color:'#475569'}},'↩ 復原'),
    h('button',{onClick:onClear,style:{padding:'6px 12px',borderRadius:6,fontSize:12,fontWeight:600,
      border:'2px solid #e2e8f0',background:'#f8fafc',color:'#dc2626'}},'🗑 清除')
  );
}

// ─── Password modal ───────────────────────────────────────────────────────────
function PwModal({onOk,onClose}) {
  const [pw,setPw] = useState('');
  const [err,setErr] = useState(false);
  const inp = useRef(null);
  useEffect(()=>inp.current?.focus(),[]);
  function submit() {
    if(pw==='lcjh'){onOk();}
    else{setErr(true);setPw('');setTimeout(()=>setErr(false),1500);}
  }
  return h('div',{onClick:onClose,style:{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',
    zIndex:50,display:'flex',alignItems:'center',justifyContent:'center',padding:16}},
    h('div',{onClick:e=>e.stopPropagation(),style:{background:'#fff',borderRadius:20,padding:32,
      maxWidth:360,width:'100%',boxShadow:'0 20px 60px rgba(0,0,0,.25)'}},
      h('h2',{style:{fontSize:20,fontWeight:700,textAlign:'center',marginBottom:6,color:'#1e293b'}},'🔒 核對全部答案'),
      h('p',{style:{fontSize:13,color:'#64748b',textAlign:'center',marginBottom:20}},'請輸入密碼以查看答案與詳解'),
      h('input',{ref:inp,type:'password',value:pw,placeholder:'輸入密碼',
        onChange:e=>setPw(e.target.value),onKeyDown:e=>e.key==='Enter'&&submit(),
        style:{width:'100%',padding:'12px',border:`2px solid ${err?'#ef4444':'#e2e8f0'}`,
               background:err?'#fef2f2':'#fff',borderRadius:10,fontSize:18,
               textAlign:'center',letterSpacing:'.3em',outline:'none'}}),
      err&&h('p',{style:{color:'#ef4444',fontSize:13,textAlign:'center',marginTop:8}},'密碼錯誤，請再試一次'),
      h('div',{style:{display:'flex',gap:10,marginTop:20}},
        h('button',{onClick:onClose,style:{flex:1,padding:11,borderRadius:10,fontSize:14,fontWeight:600,
          border:'2px solid #e2e8f0',color:'#475569',background:'#fff'}},'取消'),
        h('button',{onClick:submit,style:{flex:1,padding:11,borderRadius:10,fontSize:14,fontWeight:600,
          background:'#2563eb',color:'#fff',border:'none'}},'確認')
      )
    )
  );
}

// ─── Explanation page ─────────────────────────────────────────────────────────
function ExpCard({q,userAns}) {
  const ok = userAns===q.answer;
  const lines = q.explanation.split('\n').map((line,i)=>{
    if(!line.trim()) return h('div',{key:i,style:{height:6}});
    const html = toHtml(line);
    return h('p',{key:i,style:{lineHeight:1.8},dangerouslySetInnerHTML:{__html:html}});
  });
  return h('div',{style:{background:'#fff',borderRadius:14,overflow:'hidden',
    border:`2px solid ${ok?'#bbf7d0':'#fecaca'}`,boxShadow:'0 1px 4px rgba(0,0,0,.05)',marginBottom:16}},
    h('div',{style:{display:'flex',alignItems:'center',gap:10,padding:'10px 16px',
      background:ok?'#f0fdf4':'#fef2f2'}},
      h('span',{style:{fontSize:20}},ok?'✅':'❌'),
      h('span',{style:{fontWeight:700,color:'#1e293b'}},'第 '+q.number+' 題'),
      h('span',{style:{fontSize:13,color:'#475569',marginLeft:8}},
        '你的答案：',
        h('strong',{style:{color:ok?'#16a34a':'#dc2626'}},userAns||'未作答'),
        '　正確答案：',
        h('strong',{style:{color:'#16a34a'}},q.answer)
      )
    ),
    h('div',{style:{padding:16}},
      q.img && h('div',{style:{display:'flex',justifyContent:'center',marginBottom:12}},
        h('img',{src:window.IMGS[q.img],alt:'',style:{maxWidth:'100%',maxHeight:200,objectFit:'contain',borderRadius:8}})
      ),
      h(MathBlock,{text:q.text,style:{fontSize:13,color:'#64748b',marginBottom:12,lineHeight:1.7}}),
      h('p',{style:{fontWeight:700,color:'#1e293b',marginBottom:8}},'📖 詳細解析'),
      h('div',{style:{background:'#eff6ff',borderRadius:10,padding:14,fontSize:13,lineHeight:1.8,color:'#1e293b'}},lines)
    )
  );
}

function ExpPage({answers,onBack}) {
  const total=QUESTIONS.length;
  const correct=QUESTIONS.filter(q=>answers[q.id]===q.answer).length;
  return h('div',{style:{minHeight:'100%',background:'#f8fafc',overflowY:'auto'}},
    h('div',{style:{position:'sticky',top:0,zIndex:10,background:'#fff',borderBottom:'1px solid #e2e8f0',
      padding:'12px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',
      boxShadow:'0 1px 3px rgba(0,0,0,.06)'}},
      h('div',null,
        h('h1',{style:{fontSize:18,fontWeight:700,color:'#1e293b'}},'📋 答案詳解'),
        h('p',{style:{fontSize:13,color:'#64748b',marginTop:2}},
          '答對 ',
          h('span',{style:{fontSize:18,fontWeight:700,color:'#2563eb'}},correct),
          ' / '+total+' 題'
        )
      ),
      h('button',{onClick:onBack,style:{padding:'9px 18px',background:'#2563eb',color:'#fff',
        borderRadius:8,fontSize:13,fontWeight:600}},'返回練習')
    ),
    h('div',{style:{maxWidth:800,margin:'0 auto',padding:'20px 16px'}},
      QUESTIONS.map(q=>h(ExpCard,{key:q.id,q,userAns:answers[q.id]}))
    )
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [idx,setIdx]   = useState(0);
  const [answers,setAnswers] = useState({});
  const [annSt,setAnnSt] = useState({});
  const [scrSt,setScrSt] = useState({});
  const [tool,setTool] = useState('pen');
  const [color,setColor] = useState('#1d4ed8');
  const [showPw,setShowPw] = useState(false);
  const [showExp,setShowExp] = useState(false);

  const q = QUESTIONS[idx];
  const hasImg = !!q.img;
  const aStrokes = annSt[q.id]||[];
  const sStrokes = scrSt[q.id]||[];
  const setAnn = s => setAnnSt(p=>({...p,[q.id]:s}));
  const setSc  = s => setScrSt(p=>({...p,[q.id]:s}));

  function undo()  { hasImg?setAnn(aStrokes.slice(0,-1)):setSc(sStrokes.slice(0,-1)); }
  function clear() { hasImg?setAnn([]):setSc([]); }
  function pick(letter) { setAnswers(p=>({...p,[q.id]:letter})); }
  function optLetter(opt){ const m=opt.match(/^\(([A-D])\)/); return m?m[1]:opt[0]; }

  const answered = Object.keys(answers).length;

  if(showExp) return h(ExpPage,{answers,onBack:()=>setShowExp(false)});

  const card = (children,extra={}) =>
    h('div',{style:{background:'#fff',borderRadius:12,padding:'16px 20px',
      border:'1px solid #e2e8f0',boxShadow:'0 1px 3px rgba(0,0,0,.05)',flexShrink:0,...extra}},children);

  const badge = h('span',{style:{display:'inline-block',background:'#2563eb',color:'#fff',
    fontSize:12,fontWeight:700,padding:'3px 10px',borderRadius:6,marginRight:10,flexShrink:0}},
    '第 '+q.number+' 題');

  const qTextBlock = h('div',{style:{display:'flex',alignItems:'flex-start',gap:4}},
    badge, h(MathBlock,{text:q.text,style:{color:'#1e293b',fontSize:15,lineHeight:1.8}}));

  const optBtn = (opt) => {
    const letter = optLetter(opt);
    const sel = answers[q.id]===letter;
    return h('button',{key:opt,onClick:()=>pick(letter),
      style:{textAlign:'left',padding:'12px 16px',borderRadius:10,width:'100%',
             border:`2px solid ${sel?'#2563eb':'#e2e8f0'}`,
             background:sel?'#eff6ff':'#f8fafc',
             color:sel?'#1d4ed8':'#334155',fontWeight:500,lineHeight:1.6,
             transition:'all .15s',marginBottom:6}},
      h(MathSpan,{text:opt}));
  };

  const optGrid = h('div',{style:{display:'grid',
    gridTemplateColumns:hasImg?'1fr 1fr':'1fr',gap:6}},
    q.options.map(optBtn));

  return h('div',{style:{height:'100vh',display:'flex',flexDirection:'column',background:'#f1f5f9'}},

    // Top bar
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',
      padding:'8px 16px',background:'#fff',borderBottom:'1px solid #e2e8f0',
      flexShrink:0,boxShadow:'0 1px 3px rgba(0,0,0,.08)'}},
      h('div',null,
        h('div',{style:{fontSize:15,fontWeight:700,color:'#1e293b'}},'115年國中會考 數學複習'),
        h('div',{style:{fontSize:12,color:'#64748b',marginTop:1}},'已答 '+answered+'/'+QUESTIONS.length+' 題')
      ),
      h('button',{onClick:()=>setShowPw(true),style:{padding:'8px 16px',background:'#2563eb',
        color:'#fff',borderRadius:8,fontSize:13,fontWeight:600}},'🔐 核對全部答案')
    ),

    // Q navigation
    h('div',{style:{display:'flex',alignItems:'center',gap:8,padding:'8px 16px',
      background:'#fff',borderBottom:'1px solid #f1f5f9',flexShrink:0,overflowX:'auto'}},
      QUESTIONS.map((question,i)=>{
        const isCur=i===idx, isAns=!!answers[question.id];
        return h('button',{key:question.id,onClick:()=>setIdx(i),style:{
          flexShrink:0,width:36,height:36,borderRadius:'50%',fontSize:13,fontWeight:700,
          border:`2px solid ${isCur?'#2563eb':isAns?'#4ade80':'#e2e8f0'}`,
          background:isCur?'#2563eb':isAns?'#f0fdf4':'#f8fafc',
          color:isCur?'#fff':isAns?'#16a34a':'#475569',transition:'all .15s'}},
          question.number);
      })
    ),

    // Toolbar
    h(Toolbar,{tool,setTool,color,setColor,onUndo:undo,onClear:clear}),

    // Main content
    h('div',{style:{flex:1,display:'flex',overflow:'hidden'}},
      hasImg
        ? h('div',{style:{flex:1,display:'flex',flexDirection:'column',overflowY:'auto',padding:12,gap:10}},
            card(qTextBlock),
            h(ImgAnnotate,{imgKey:q.img,strokes:aStrokes,onStrokes:setAnn,tool,color}),
            card(optGrid)
          )
        : h(React.Fragment,null,
            h('div',{style:{width:'55%',display:'flex',flexDirection:'column',overflowY:'auto',padding:12,gap:10}},
              card(qTextBlock),
              card(h('div',null,q.options.map(optBtn)))
            ),
            h('div',{style:{flex:1,display:'flex',flexDirection:'column',padding:12}},
              h(ScratchPad,{strokes:sStrokes,onStrokes:setSc,tool,color})
            )
          )
    ),

    // Bottom nav
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',
      padding:'10px 20px',background:'#fff',borderTop:'1px solid #e2e8f0',flexShrink:0}},
      h('button',{disabled:idx===0,onClick:()=>setIdx(i=>i-1),style:{
        padding:'10px 20px',borderRadius:8,fontSize:14,fontWeight:600,
        border:'2px solid #e2e8f0',color:'#475569',opacity:idx===0?.4:1,cursor:idx===0?'default':'pointer'
      }},'← 上一題'),
      h('span',{style:{fontSize:13,color:'#64748b',fontWeight:500}},`${idx+1} / ${QUESTIONS.length}`),
      h('button',{disabled:idx===QUESTIONS.length-1,onClick:()=>setIdx(i=>i+1),style:{
        padding:'10px 20px',borderRadius:8,fontSize:14,fontWeight:600,
        border:'2px solid #e2e8f0',color:'#475569',
        opacity:idx===QUESTIONS.length-1?.4:1,cursor:idx===QUESTIONS.length-1?'default':'pointer'
      }},'下一題 →')
    ),

    showPw && h(PwModal,{onOk:()=>{setShowPw(false);setShowExp(true);},onClose:()=>setShowPw(false)})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
